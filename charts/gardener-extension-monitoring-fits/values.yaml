webhookConfig:
  serverPort: 443

config:
  clientConnection:
    acceptContentTypes: application/json
    contentType: application/json
    qps: 100
    burst: 130
  alertmanager:
    url: alerts.example.com:443
    username: admin
    password: your-password-here
    pathPrefix: /
    scheme: https
  prometheusRules:
    spec:
  imagePullSecret:
    encodedDockerConfigJSON:

gardener:
  version: ""
  gardenlet:
    featureGates: {}
